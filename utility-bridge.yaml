substitutions:
  devicename: zehnder_fan
  upper_devicename: Zehnder Fan

esphome:
  name: zehnder-fan
  comment: Zehnder Fan controller

esp32:
  board: esp32doit-devkit-v1
  framework:
    type: arduino

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: !secret esphome_utility_bridge_api_password

  services:
    - service: set_speed
      variables:
        run_speed: int
        run_time: int
      then:
        - lambda: |-
            zehnder_fan->setSpeed(run_speed, run_time);

    # Re-pair this controller to the fan. Put the main unit into its pairing
    # window first (ComfoFan S: power-cycle the unit -> ~10 min join window),
    # then call this service. The unit registers our device id so it answers
    # our queries/commands again.
    - service: start_pairing
      then:
        - lambda: |-
            zehnder_fan->startPairing();

    # Re-apply the nRF905 config + TX address without rebooting the ESP. Recovers
    # a soft radio config glitch (logs whether SPI verified). Does NOT power-cycle
    # the chip, so a true hardware wedge still needs a VCC cut.
    - service: reinit_radio
      then:
        - lambda: |-
            id(nrf905_rf)->reinitRadio();

ota:
  - platform: esphome
    password: !secret esphome_utility_bridge_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  manual_ip:
    static_ip: !secret wifi_ip_utility_bridge
    gateway: !secret wifi_gateway
    subnet: !secret wifi_subnet

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "utility-bridge Fallback"
    password: !secret esphome_utility_bridge_ap_password

captive_portal:

web_server:
  port: 80

time:
  - platform: homeassistant
    id: homeassistant_time
    timezone: Europe/Amsterdam

button:
  - platform: restart
    id: ${devicename}_esphome_restart
    name: "System restart"

  - platform: template
    id: ${devicename}_high_10
    name: ${upper_devicename} High 10
    on_press:
      then:
        lambda: |-
          zehnder_fan->setSpeed(3, 10);

  - platform: template
    id: ${devicename}_high_30
    name: ${upper_devicename} High 30
    on_press:
      then:
        lambda: |-
          zehnder_fan->setSpeed(3, 30);

  - platform: template
    id: ${devicename}_high_60
    name: ${upper_devicename} High 60
    on_press:
      then:
        lambda: |-
          zehnder_fan->setSpeed(3, 60);

  - platform: template
    id: ${devicename}_high_120
    name: ${upper_devicename} High 120
    on_press:
      then:
        lambda: |-
          zehnder_fan->setSpeed(3, 120);

sensor:
  - platform: wifi_signal
    name: "WiFi signal"
    update_interval: 60s
  - platform: uptime
    type: timestamp
    name: "System boot time"

  # --- nRF905 / RF link diagnostics ---
  # The nRF905 has no RSSI; these are the closest proxies for link quality and
  # channel congestion. Useful for the "bad radio" / soak investigation.
  - platform: template
    name: "RF channel busy"
    id: rf_channel_busy
    unit_of_measurement: "%"
    accuracy_decimals: 1
    entity_category: diagnostic
    update_interval: 60s
    lambda: "return id(nrf905_rf)->getChannelBusyPercent();"
  - platform: template
    name: "RF frames received"
    unit_of_measurement: "frames"
    accuracy_decimals: 0
    entity_category: diagnostic
    state_class: total_increasing
    update_interval: 60s
    lambda: "return id(nrf905_rf)->getRxValidCount();"
  - platform: template
    name: "RF frames sent"
    unit_of_measurement: "frames"
    accuracy_decimals: 0
    entity_category: diagnostic
    state_class: total_increasing
    update_interval: 60s
    lambda: "return id(nrf905_rf)->getTxCount();"
  - platform: template
    name: "RF CRC errors"
    unit_of_measurement: "frames"
    accuracy_decimals: 0
    entity_category: diagnostic
    state_class: total_increasing
    update_interval: 60s
    lambda: "return id(nrf905_rf)->getRxInvalidCount();"
  - platform: template
    name: "Fan poll success rate"
    unit_of_measurement: "%"
    accuracy_decimals: 1
    entity_category: diagnostic
    update_interval: 60s
    lambda: "return zehnder_fan->getQuerySuccessPercent();"
  # Self-heal threshold: consecutive poll timeouts before auto re-pair (0 = off).
  - platform: template
    name: "Fan self-heal threshold"
    unit_of_measurement: "timeouts"
    accuracy_decimals: 0
    entity_category: diagnostic
    update_interval: 60s
    lambda: "return id(zehnder_fan)->getSelfHealThreshold();"

binary_sensor:
  # Live nRF905 SPI health, from the idle SPI probe + per-TX config readback
  # verify. ON = healthy/connected; OFF = SPI wedged (brownout) -> check the
  # 3.3 V rail. Replaces the removed "Radio break count" / break-history.
  - platform: template
    name: "RF SPI healthy"
    device_class: connectivity
    entity_category: diagnostic
    lambda: "return id(nrf905_rf)->getLastConfigWriteOk();"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: WiFi IP-adres
      icon: mdi:ip-network
    ssid:
      name: WiFi netwerk
      icon: mdi:access-point-network
    mac_address:
      name: WiFi MAC-adres
      icon: mdi:folder-key-network-outline
  - platform: version
    name: "System ESPHome version"
    hide_timestamp: true

  # --- Live paired identity (from flash/discovery or a YAML pin) ---
  # Shown as hex so the current pairing is visible in HA without a log capture.
  - platform: template
    name: "Fan network id"
    entity_category: diagnostic
    update_interval: 60s
    lambda: |-
      char buf[12];
      snprintf(buf, sizeof(buf), "0x%08X", id(zehnder_fan)->getNetworkId());
      return std::string(buf);
  - platform: template
    name: "Fan main unit id"
    entity_category: diagnostic
    update_interval: 60s
    lambda: |-
      char buf[6];
      snprintf(buf, sizeof(buf), "0x%02X", id(zehnder_fan)->getMainUnitId());
      return std::string(buf);
  - platform: template
    name: "Fan main unit type"
    entity_category: diagnostic
    update_interval: 60s
    lambda: |-
      char buf[6];
      snprintf(buf, sizeof(buf), "0x%02X", id(zehnder_fan)->getMainUnitType());
      return std::string(buf);
  # "Controller" = this ESPHome device's own RF identity (a REMOTE_CONTROL,
  # type 0x03), as registered with the fan's main unit -- not the fan itself.
  - platform: template
    name: "Fan controller id"
    entity_category: diagnostic
    update_interval: 60s
    lambda: |-
      char buf[6];
      snprintf(buf, sizeof(buf), "0x%02X", id(zehnder_fan)->getMyDeviceId());
      return std::string(buf);
  - platform: template
    name: "Fan controller type"
    entity_category: diagnostic
    update_interval: 60s
    lambda: |-
      char buf[6];
      snprintf(buf, sizeof(buf), "0x%02X", id(zehnder_fan)->getMyDeviceType());
      return std::string(buf);

# Load external components
# https://esphome.io/components/external_components.html#external-components-git
external_components:
  - source:
      type: local
      path: components

# SPI
spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  miso_pin: GPIO12

# nRF905 config
nrf905:
  id: "nrf905_rf"
  cs_pin: GPIO23
  cd_pin: GPIO33
  ce_pin: GPIO27
  pwr_pin: GPIO26
  txen_pin: GPIO25
  # We don't need AM and DR at the moment as they are read from the internal registers
  am_pin: GPIO32
  dr_pin: GPIO35
  # Onboard LED — flashes briefly on each received RF frame (RX activity).
  led_pin: GPIO2

# The FAN controller
fan:
  - platform: zehnder
    id: zehnder_fan
    name: "Ventilation"
    nrf905: nrf905_rf
    update_interval: "60s"
    # Optional: pin the paired identity so it survives a flash erase / fresh
    # install instead of relying on the flash-stored auto-discovery. Values below
    # were captured by a successful re-pair on 2026-06-24 (see CLAUDE.md). Leave
    # commented to keep auto-discovery + self-heal primary; uncomment to pin.
    # network_id: 0xCB109EA2
    # main_unit_id: 0xD9
    # device_id: 0x86
    # main_unit_type: 0x01    # default
    # device_type: 0x03       # default
    # self_heal_after: 10     # default consecutive-timeout threshold (0 disables)
