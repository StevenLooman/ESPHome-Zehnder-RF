# Minimal config used only by CI to compile-test the local components.
# No wifi / api / ota / secrets needed for a compile check.
esphome:
  name: ci-test
  comment: CI compile test

esp32:
  board: esp32doit-devkit-v1
  framework:
    type: arduino

logger:
  level: DEBUG

# Build the components from this repo (not from GitHub), so CI tests the
# code under review.
external_components:
  - source:
      type: local
      path: ../components

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  miso_pin: GPIO12

nrf905:
  id: nrf905_rf
  cs_pin: GPIO23
  cd_pin: GPIO33
  ce_pin: GPIO27
  pwr_pin: GPIO26
  txen_pin: GPIO25
  am_pin: GPIO32
  dr_pin: GPIO35

fan:
  - platform: zehnder
    id: zehnder_fan
    name: "Ventilation"
    nrf905: nrf905_rf
    update_interval: "60s"
